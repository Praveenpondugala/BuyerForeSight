services:
  - type: web
    name: buyerforesight-user-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./data/users.db
      - key: LOG_LEVEL
        value: INFO
